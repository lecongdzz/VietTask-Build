name: Build APK VIP 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk bsdmainutils triggerhappy libstdc++6 Autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Auto Accept Android Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Tự động đồng ý tất cả điều khoản SDK của Google để không bị dừng tiến trình
          yes | buildozer android licenses || true

      - name: Build APK with Buildozer
        run: |
          # Ép chạy không dùng quyền root tuyệt đối để Buildozer không từ chối
          buildozer -v android debug

      - name: Upload APK Thanh Pham
        uses: actions/upload-artifact@v4
        with:
          name: VietTask-Automation-APK
          path: bin/*.apk
          
