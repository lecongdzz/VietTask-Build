name: Build APK VIP 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git ffmpeg libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev libasound2-dev libsqlite3-dev uuid-dev libssl-dev libffi-dev libgmp3-dev libvlc-dev libmtdev-dev inputproto-dev libx14-dev libxext-dev libxfixes-dev libxi-dev libxrandr-dev libxrender-dev libxkbcommon-dev libxkbcommon-x11-dev libvdpau-dev libva-dev libpango1.0-dev libgdk-pixbuf2.0-dev
          sudo apt-get install -y openjdk-17-jdk unzip zip
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Product
        uses: actions/upload-artifact@v4
        with:
          name: VietTask-Automation-APK
          path: bin/*.apk
          
