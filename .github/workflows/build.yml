name: Build APK VIP 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git openjdk-17-jdk unzip zip zlib1g-dev libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK with Buildozer
        run: |
          # Chạy thẳng trực tiếp, thằng Buildozer trên GitHub tự động chấp nhận SDK
          buildozer -v android debug

      - name: Upload APK Product
        uses: actions/upload-artifact@v4
        with:
          name: VietTask-Automation-APK
          path: bin/*.apk
          
